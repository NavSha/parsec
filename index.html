<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARSEC — scroll to the edge of the known universe</title>
  <meta name="description" content="A scrolling journey from the Sun past every planet you know, and thousands you don't." />
  <meta name="theme-color" content="#04060c" />
  <meta property="og:title" content="PARSEC" />
  <meta property="og:description" content="Scroll to the edge of the known universe — past every known world." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://navsha.github.io/parsec/" />
  <meta property="og:image" content="https://navsha.github.io/parsec/assets/og.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://navsha.github.io/parsec/assets/og.jpg" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2304060c'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%239fc4ff' stroke-width='1.5'/%3E%3Ccircle cx='25' cy='9' r='1.5' fill='%23e8edf5'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <canvas id="stars" aria-hidden="true"></canvas>
  <canvas id="field" aria-hidden="true"></canvas>
  <div id="counter" aria-live="off">
    <div class="value">0</div>
    <div class="unit">km</div>
    <div class="unit-note"></div>
    <div class="passed"></div>
  </div>
  <div id="tooltip" hidden></div>
  <button id="sound" aria-label="Toggle ambient sound" aria-pressed="false" title="Ambient sound">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 2.5 4.5 5.5H2v5h2.5L8 13.5z" />
      <path class="wave" d="M10.5 5.5a3.5 3.5 0 0 1 0 5" />
      <path class="wave" d="M12.5 3.5a6.3 6.3 0 0 1 0 9" />
    </svg>
  </button>

  <header id="title">
    <h1>PARSEC</h1>
    <p>A journey past every known world</p>
    <div class="hint">Scroll to depart</div>
  </header>

  <main id="journey"></main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
